# docker-compose.yml
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: project_management_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project_management
      MYSQL_USER: project_user
      MYSQL_PASSWORD: project_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project_management_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://project_user:project_password@mysql:3306/project_management
      JWT_SECRET: your-jwt-secret-key-change-in-production
      WECHAT_APP_ID: your-wechat-app-id
      WECHAT_APP_SECRET: your-wechat-app-secret
      DINGTALK_APP_KEY: your-dingtalk-app-key
      DINGTALK_APP_SECRET: your-dingtalk-app-secret
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mysql_data:
