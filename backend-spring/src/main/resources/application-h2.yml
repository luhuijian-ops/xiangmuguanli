server:
  port: 6200

spring:
  application:
    name: xiangmuguanli
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        hibernate:
          default_batch_fetch_size: 20
          order_inserts: true
          order_updates: true
          batch_versioned_data: true

jwt:
  secret: default-secret-change-in-production-must-be-at-least-32-chars
  access-token-expiration: 7200000
  refresh-token-expiration: 2592000000

logging:
  level:
    com.xiangmuguanli: debug
    org.springframework.security: info