server:
  port: 6200
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: xiangmuguanli
  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:xiangmuguanli}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:default-secret-change-in-production-must-be-at-least-32-chars}
  access-token-expiration: 7200000  # 2 hours in milliseconds
  refresh-token-expiration: 2592000000  # 30 days in milliseconds

oauth:
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    redirect-uri: ${WECHAT_REDIRECT_URI:}
  dingtalk:
    app-id: ${DINGTALK_APP_ID:}
    app-secret: ${DINGTALK_APP_SECRET:}
    redirect-uri: ${DINGTALK_REDIRECT_URI:}

upload:
  dir: ${UPLOAD_DIR:./uploads}
  max-size: 10485760  # 10MB

logging:
  level:
    com.xiangmuguanli: debug
    org.springframework.security: info
